name: Daily Stock Report → Google Sheets

on:
  schedule:
    # 2:30 AM UTC = 8:00 AM IST, Monday-Friday
    - cron: '30 2 * * 1-5'
  workflow_dispatch: {}   # allows manual "Run workflow" from Actions tab

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            yfinance \
            pandas \
            requests \
            vaderSentiment \
            gspread \
            google-auth \
            tzdata

      - name: Run daily stock report
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
        run: python3 daily_report_sheets.py --now
